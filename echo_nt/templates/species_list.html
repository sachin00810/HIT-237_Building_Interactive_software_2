{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

    <h2>Species List</h2>

    <div class="row">
        {% for sp in species %}
            <div class="col-md-4">
                <div class="card p-3 mb-3 shadow-sm">
                    <h5>{{ sp.name }}</h5>
                </div>
            </div>
        {% empty %}
            <p>No species found.</p>
        {% endfor %}
    </div>

</div>
{% endblock %}
