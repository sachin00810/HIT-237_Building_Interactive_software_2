<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EchoNT</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
        crossorigin="anonymous"
    >
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'observation-list' %}">EchoNT</a>
    <div class="d-flex ms-auto align-items-center gap-3">

    <a class="btn btn-light btn-sm" href="{% url 'observation-list' %}">
        Observations
    </a>

    <a class="btn btn-light btn-sm" href="{% url 'observation-create' %}">
        Add Observation
    </a>

    <a class="btn btn-light btn-sm" href="{% url 'species-list' %}">
        Species
    </a>

    {% if user.is_authenticated %}
        <span class="navbar-text text-white-50">
            Signed in as {{ user.username }}
        </span>

        <a class="btn btn-outline-light btn-sm" href="{% url 'password_change' %}">
            Change Password
        </a>

        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">
                Logout
            </button>
        </form>
    {% endif %}

</div>
        </div>
    </nav>

    <main class="container py-4">
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
